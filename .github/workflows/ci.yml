name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tradebot
          POSTGRES_PASSWORD: tradebot
          POSTGRES_DB: tradebot
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      # conftest builds tradebot_test from these; app settings read the same.
      DATABASE_URL: postgresql+psycopg://tradebot:tradebot@localhost:5432/tradebot
      TEST_DATABASE_URL: postgresql+psycopg://tradebot:tradebot@localhost:5432/tradebot_test
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check app tests scripts

      - name: Test (unit + integration)
        run: uv run pytest -q
