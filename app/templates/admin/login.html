<!doctype html>
<html lang="vi" data-theme="corporate">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login - tradebot</title>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="min-h-screen bg-base-200 flex items-center justify-center p-4">
  <div class="card bg-base-100 shadow-md w-full max-w-sm">
    <div class="card-body">
      <h1 class="card-title">tradebot admin</h1>
      {% if error %}
      <div class="alert alert-error text-sm" role="alert"><span>{{ error }}</span></div>
      {% endif %}
      <form method="post" action="/admin/login" class="space-y-3">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="form-control">
          <label class="label" for="username"><span class="label-text">Username</span></label>
          <input id="username" name="username" autocomplete="username" class="input input-bordered w-full">
        </div>
        <div class="form-control">
          <label class="label" for="password"><span class="label-text">Password</span></label>
          <input id="password" name="password" type="password" autocomplete="current-password" class="input input-bordered w-full">
        </div>
        <button type="submit" class="btn btn-primary w-full">Đăng nhập</button>
      </form>
    </div>
  </div>
</body>
</html>
