<!doctype html>
<html lang="vi" data-theme="corporate">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Đăng nhập · tradebot</title>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="min-h-screen bg-base-200 flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <div class="flex items-center gap-2 justify-center mb-6">
      <span class="size-9 rounded-xl bg-primary text-primary-content grid place-items-center font-bold">tb</span>
      <span class="text-xl font-semibold tracking-tight">tradebot</span>
    </div>
    <div class="rounded-2xl border border-base-300 bg-base-100 shadow-sm p-6">
      <h1 class="text-lg font-semibold mb-1">Đăng nhập quản trị</h1>
      <p class="text-sm text-base-content/50 mb-4">Forex Signal Bot Console</p>
      {% if error %}
      <div class="alert alert-error text-sm mb-4" role="alert">
        <svg xmlns="http://www.w3.org/2000/svg" class="size-4 shrink-0" fill="none" viewBox="0 0 24 24"
             stroke="currentColor" stroke-width="2"><path stroke-linecap="round" d="M12 9v3.75m0 3.75h.007M10.36 3.34l-8.4 14.55A1.5 1.5 0 003.26 20h17.48a1.5 1.5 0 001.3-2.11L13.64 3.34a1.5 1.5 0 00-2.6 0z"/></svg>
        <span>{{ error }}</span>
      </div>
      {% endif %}
      <form method="post" action="/admin/login" class="space-y-3">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <label class="form-control w-full">
          <span class="label-text text-sm mb-1">Username</span>
          <input name="username" autocomplete="username" required class="input input-bordered w-full">
        </label>
        <label class="form-control w-full">
          <span class="label-text text-sm mb-1">Password</span>
          <input name="password" type="password" autocomplete="current-password" required class="input input-bordered w-full">
        </label>
        <button type="submit" class="btn btn-primary w-full mt-1">Đăng nhập</button>
      </form>
    </div>
  </div>
</body>
</html>
